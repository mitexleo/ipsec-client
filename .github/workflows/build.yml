name: Build and Package

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build:
    name: Build on ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: ubuntu
            container: null
          - target: fedora
            container: fedora:latest
          - target: flatpak
            container: null

    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.target == 'ubuntu'
        run: |
          apt update
          apt install -y cmake g++ qt6-base-dev libgl1-mesa-dev

      - name: Install dependencies (Fedora)
        if: matrix.target == 'fedora'
        run: |
          dnf install -y cmake gcc-c++ qt6-qtbase-devel

      - name: Install Flatpak dependencies
        if: matrix.target == 'flatpak'
        run: |
          apt update
          apt install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//24.08 org.kde.Platform//6.8 org.kde.Sdk//6.8

      - name: Build (native)
        if: matrix.target != 'flatpak'
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Build (Flatpak)
        if: matrix.target == 'flatpak'
        run: |
          flatpak-builder --force-clean build-dir flatpak/io.github.mitexleo.ipsec_client.yml

      - name: Package (native)
        if: matrix.target != 'flatpak'
        run: |
          cd build
          cpack

      - name: Export Flatpak
        if: matrix.target == 'flatpak'
        run: |
          flatpak build-export export-dir build-dir

      - name: Upload package
        if: matrix.target != 'flatpak'
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: build/*.deb build/*.rpm

      - name: Upload Flatpak artifact
        if: matrix.target == 'flatpak'
        uses: actions/upload-artifact@v4
        with:
          name: package-flatpak
          path: export-dir

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            *.deb
            *.rpm

  version-bump:
    name: Bump patch version
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read and increment version
        run: |
          VERSION=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          echo "${MAJOR}.${MINOR}.${PATCH}" > VERSION

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to $(cat VERSION) [skip ci]"
          git push
