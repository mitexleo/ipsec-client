name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump and tag
        run: |
          VERSION=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to $NEW_VERSION [skip ci]"
          git push origin main || (git pull --rebase origin main && git push origin main)
          git tag "v$NEW_VERSION"
          git push origin "v$VERSION"

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build binary and packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev libgl1-mesa-dev ruby rpm
          sudo gem install fpm
      - name: Configure and build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          DESTDIR=/tmp/ipsec-client-build cmake --install .
      - name: Package .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm -s dir -t deb -n ipsec-client -v "$VERSION" --iteration 1 --architecture amd64 --description "GUI for managing strongSwan IPsec VPN connections" --license GPL-2.0-or-later --url "https://github.com/${{ github.repository }}" --maintainer "${{ github.repository_owner }}" --deb-no-default-config-files --after-install scripts/postinst -C /tmp/ipsec-client-build usr/bin/ipsec-client usr/share/applications/ipsec-client.desktop usr/share/icons/hicolor/scalable/apps/ipsec-client.svg
      - name: Package .rpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm -s dir -t rpm -n ipsec-client -v "$VERSION" --iteration 1 --architecture x86_64 --rpm-os linux --description "GUI for managing strongSwan IPsec VPN connections" --license GPL-2.0-or-later --url "https://github.com/${{ github.repository }}" --maintainer "${{ github.repository_owner }}" -C /tmp/ipsec-client-build usr/bin/ipsec-client usr/share/applications/ipsec-client.desktop usr/share/icons/hicolor/scalable/apps/ipsec-client.svg
      - name: List packages
        run: ls -la ipsec-client*.deb ipsec-client*.rpm
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ipsec-client ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          files: |
            ipsec-client_*.deb
            ipsec-client*.rpm
          generate_release_notes: true

  flatpak:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Cache Flatpak runtimes
        id: cache-flatpak
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/flatpak
            .flatpak-builder
          key: flatpak-${{ runner.os }}-kde-6.8
      - name: Add Flathub remote
        if: steps.cache-flatpak.outputs.cache-hit != 'true'
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Install KDE Platform and SDK
        if: steps.cache-flatpak.outputs.cache-hit != 'true'
        run: |
          flatpak install --user -y flathub org.kde.Platform//6.8
          flatpak install --user -y flathub org.kde.Sdk//6.8
      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --user --disable-cache build-dir flatpak/io.github.mitexleo.ipsec_client.yml
      - name: Export and bundle
        run: |
          flatpak build-export repo build-dir
          flatpak build-bundle repo ipsec-client.flatpak io.github.mitexleo.ipsec_client
      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: ipsec-client.flatpak
          tag_name: ${{ github.ref_name }}
