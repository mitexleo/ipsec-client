name: Build and Release
on:
  push:
    branches: [main]
    tags: [v*]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ qt6-base-dev libgl1-mesa-dev ruby rpm && sudo gem install fpm
      - name: Build
        run: mkdir build && cd build && cmake .. -DCMAKE_INSTALL_PREFIX=/usr && make -j$(nproc)
      - name: Install DESTDIR
        run: DESTDIR=/tmp/ipsec-client-build cmake --install build
      - name: Package .deb
        run: |
          VERSION=$(cat VERSION)
          fpm -s dir -t deb -n ipsec-client -v "$VERSION" --iteration 1 --architecture amd64 --description "IPsec VPN client" --license GPL-2.0 --url https://github.com/${{ github.repository }} -C /tmp/ipsec-client-build usr/bin/ipsec-client usr/share/applications/ipsec-client.desktop usr/share/icons/hicolor/scalable/apps/ipsec-client.svg
      - name: Package .rpm
        run: |
          VERSION=$(cat VERSION)
          fpm -s dir -t rpm -n ipsec-client -v "$VERSION" --iteration 1 --architecture x86_64 --rpm-os linux --description "IPsec VPN client" --license GPL-2.0 --url https://github.com/${{ github.repository }} -C /tmp/ipsec-client-build usr/bin/ipsec-client usr/share/applications/ipsec-client.desktop usr/share/icons/hicolor/scalable/apps/ipsec-client.svg
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: '*.deb *.rpm'
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: '*.deb *.rpm'
          generate_release_notes: true
